[build]
  publish = "."

[[redirects]]
  from = "/api/*"
  to = "https://SEU-BACKEND.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "https://SEU-BACKEND.up.railway.app/health"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
